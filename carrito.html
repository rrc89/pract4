<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Tu Carrito - SuperMercado</title>
  <link rel="stylesheet" href="estilo.css">
</head>
<body>
  <nav id="inicio-carrito">
    <a href="index.html">Inicio</a>
    <a href="productos.html">Productos</a>
    <a href="carrito.html">Mi Carrito</a>
    <a href="contacto.html">Contacto</a>
  </nav>
  <main class="carrito-contenedor">
    <h2 class="titulos-color">Tu Cesta de la Compra</h2>
    <table class="tabla-carrito">
      <thead>
        <tr>
          <th>Producto</th>
          <th>Cantidad</th>
          <th>Precio Unid.</th>
          <th>Subtotal</th>
          <th>Eliminar</th>
        </tr>
      </thead>
      <tbody>
        <!-- Filas generadas por JavaScript -->
      </tbody>
      <tfoot>
        <tr class="fila-total">
          <td colspan="3">TOTAL A PAGAR</td>
          <td colspan="2">0.00€</td>
        </tr>
      </tfoot>
    </table>
    <div class="acciones-carrito">
      <a href="productos.html" class="btn-secundario">Seguir Comprando</a>
      <button class="btn-primario">Finalizar Pedido</button>
    </div>
  </main>
  <script src="script.js"></script>
</body>
</html>
