<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Tu Carrito - SuperMercado</title>
  <link rel="stylesheet" href="estilo.css">
</head>
<body>
  <nav id="inicio-carrito">
    <a href="index.html">Inicio</a>
    <a href="productos.html">Productos</a>
    <a href="carrito.html">Mi Carrito</a>
    <a href="contacto.html">Contacto</a>
  </nav>
  <main class="carrito-contenedor"><!--tamano max de la pagina de la tabla del carrito-->
    <h2 class="titulos-color">Tu Cesta de la Compra</h2>
    
    <table class="tabla-carrito"><!--defino el diseno de la tabla en el css-->
      <thead>
        <tr>
          <th>Producto</th>
          <th>Cantidad</th>
          <th>Precio Unid.</th>
          <th>Subtotal</th>
          <th>Eliminar</th>
        </tr>
      </thead>
      <tbody></tbody>
      <tfoot>
        <tr class="fila-total">
          <td colspan="3">TOTAL A PAGAR</td>
          <td colspan="2">0.00€</td>
        </tr>
      </tfoot>
    </table>
    <div class="acciones-carrito">
      <a href="productos.html" class="btn-secundario">Seguir Comprando</a>
      <button class="btn-primario" onclick="abrirFormularioPedido()">Finalizar Pedido</button>
    </div>
  </main>

  <!-- esto es para el formulario de pedido, confirmar y realizar la compra -->
  <div id="modal-pedido" class="modal-oculto">
    <div class="modal-contenido">
      <h2 class="titulos-color">Datos de entrega</h2>
      <form id="form-pedido" onsubmit="confirmarPedido(event)">
        <label>Nombre: <input type="text" name="nombre" required></label>
        <label>Apellidos: <input type="text" name="apellidos" required></label>
        <label>Teléfono: <input type="tel" name="telefono" required></label>
        <label>Correo: <input type="email" name="correo" required></label>
        <label>Dirección: <input type="text" name="direccion" required></label>
        <label>Horario de entrega:
          <select name="horario" required>
            <option value="">Seleccionar...</option>
            <option value="9-12">Mañana (9:00 - 12:00)</option>
            <option value="12-15">Mediodía (12:00 - 15:00)</option>
            <option value="15-18">Tarde (15:00 - 18:00)</option>
            <option value="18-21">Noche (18:00 - 21:00)</option>
          </select>
        </label>
        <label>Comentarios de entrega:
          <textarea name="comentarios" rows="3" placeholder="Piso, puerta, instrucciones..."></textarea>
        </label>
        <label>Método de pago:
          <select name="pago" required>
            <option value="">Seleccionar...</option>
            <option value="tarjeta">Tarjeta de crédito</option>
            <option value="bizum">Bizum</option>
            <option value="efectivo">Efectivo al recibir</option>
          </select>
        </label>
        <label id="label-tarjeta" style="display:none">Número de tarjeta:
          <input type="text" name="tarjeta" pattern="[0-9]{16}" placeholder="16 dígitos">
        </label>
        <div class="acciones-modal">
          <button type="button" class="btn-secundario" onclick="cerrarFormularioPedido()">Cancelar</button>
          <button type="submit" class="btn-primario">Confirmar pedido</button>
        </div>
      </form>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
