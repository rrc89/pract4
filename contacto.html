<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Contacto - SuperMercado</title>
    <link rel="stylesheet" href="estilo.css">
</head>
<body>

    <nav>
        <a href="index.html">Inicio</a>
        <a href="productos.html">Productos</a>
        <a href="carrito.html">Mi Carrito</a>
        <a href="contacto.html">Contacto</a>
    </nav>

    <main>
        <h2 class="titulos-color">Contacta con nosotros</h2>
        <p>Si tienes dudas, rellena este formulario:</p>

        <form>
            <label for="nombre">Nombre:</label>
            <input type="text" id="nombre" name="nombre" placeholder="Tu nombre">

            <label for="email">Correo Electrónico:</label>
            <input type="email" id="email" name="email" required>

            <label for="motivo">Motivo:</label>
            <select id="motivo">
                <option value="duda">Duda sobre pedido</option>
                <option value="queja">Reclamación</option>
                <option value="otros">Otros</option>
            </select>

            <button type="submit" class="boton-formulario">Enviar mensaje</button>
        </form>

        <hr>
        <p>O envíanos un email directamente:</p>
        <a href="mailto:supermercado@ejemplo.com" class="boton-correo">Enviar Correo</a>
    </main>

</body>
</html>
