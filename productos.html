<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Productos - SuperMercado</title>
  <link rel="stylesheet" href="estilo.css">
</head>
<body>
  <nav>
    <a href="index.html">Inicio</a>
    <a href="productos.html">Productos</a>
    <a href="carrito.html">Mi Carrito</a>
    <a href="contacto.html">Contacto</a>
  </nav>
  <main>
    <h2 class="titulos-color">Nuestros Productos</h2>
    <div class="grid-productos">

      <div class="tarjeta">
        <img src="https://lechepascual.es/wp-content/uploads/2018/05/3.png" alt="Leche Semidesnatada">
        <h3 class="subtitulos-color">Leche Semidesnatada</h3>
        <p>Categoría: Lácteos</p>
        <span class="precio">1.20€</span>
        <button class="boton-comprar" onclick="añadirAlCarrito(1, 'Leche Semidesnatada', 1.20)">Añadir</button>
      </div>

      <div class="tarjeta">
        <img src="https://panamarbakery.com/public/Image/2021/1/161192842912608normal_Galeria.png" alt="Barra de Pan">
        <h3 class="subtitulos-color">Barra de Pan</h3>
        <p>Categoría: Panadería</p>
        <span class="precio">0.85€</span>
        <button class="boton-comprar" onclick="añadirAlCarrito(2, 'Barra de Pan', 0.85)">Añadir</button>
      </div>

      <div class="tarjeta">
        <img src="https://png.pngtree.com/png-vector/20240822/ourmid/pngtree-freshness-packed-in-every-egg-carton-on-transparent-background-png-image_13591613.png" alt="Huevos">
        <h3 class="subtitulos-color">Docena de Huevos</h3>
        <p>Categoría: Granja</p>
        <span class="precio">2.50€</span>
        <button class="boton-comprar" onclick="añadirAlCarrito(3, 'Docena de Huevos', 2.50)">Añadir</button>
      </div>

    </div>
  </main>
  <script src="script.js"></script>
</body>
</html>
